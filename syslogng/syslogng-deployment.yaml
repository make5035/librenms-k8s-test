# ==============================================================================
# syslogng/syslogng-deployment.yaml
# syslog-ng 4.8.3 — Réception syslog réseau
# ==============================================================================
# NOUVEAU fichier — composant absent du cluster (actif en prod Docker)
#
# Mesures prod : NET I/O 3,65 Go entrant / 2,26 Go sortant — actif
# syslog-ng est inclus dans l'image librenms/librenms:26.2.0
# Activation via variable SIDECAR_SYSLOGNG=1
#
# Exposition réseau :
#   - Service type LoadBalancer (MetalLB) sur IP dédiée
#   - Ports 514 TCP et UDP
#   - Annotation allow-shared-ip pour partager une IP MetalLB si nécessaire
#
# ATTENTION : K8s ne supporte pas nativement TCP+UDP sur le même Service
# LoadBalancer. Deux Services distincts sont créés avec la même IP MetalLB
# via l'annotation metallb.universe.tf/allow-shared-ip
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: librenms-syslogng
  namespace: librenms
  labels:
    app: librenms-syslogng
    component: syslog
    version: "4.8.3"
spec:
  replicas: 1
  # NE PAS scaler > 1 : un seul pod doit recevoir le syslog
  # (pas de déduplication multi-pod native sans broker)
  selector:
    matchLabels:
      app: librenms-syslogng
  template:
    metadata:
      labels:
        app: librenms-syslogng
        component: syslog
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: syslogng
        image: librenms/librenms:26.2.0
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW
        ports:
        - containerPort: 514
          name: syslog-tcp
          protocol: TCP
        - containerPort: 514
          name: syslog-udp
          protocol: UDP
        env:
        - name: SIDECAR_SYSLOGNG
          value: "1"
        - name: TZ
          value: "Europe/Paris"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: DB_HOST
          value: "192.168.98.131"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "librenms"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: librenms-secret
              key: db-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: librenms-secret
              key: db-password
        - name: DB_TIMEOUT
          value: "60"
        - name: REDIS_HOST
          value: "redis.librenms.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_DB
          value: "0"
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: librenms-data
          mountPath: /data
      volumes:
      - name: librenms-data
        persistentVolumeClaim:
          claimName: librenms-data-pvc

---
# Service syslog-ng TCP — LoadBalancer MetalLB IP fixe
# Les équipements réseau envoient leurs syslog sur cette IP:514/TCP
apiVersion: v1
kind: Service
metadata:
  name: librenms-syslogng-tcp
  namespace: librenms
  labels:
    app: librenms-syslogng
  annotations:
    # Même clé sur TCP et UDP → MetalLB assigne la même IP aux deux Services
    metallb.universe.tf/allow-shared-ip: "librenms-syslog"
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.98.241
  selector:
    app: librenms-syslogng
  ports:
  - name: syslog-tcp
    port: 514
    targetPort: 514
    protocol: TCP

---
# Service syslog-ng UDP — LoadBalancer MetalLB même IP
apiVersion: v1
kind: Service
metadata:
  name: librenms-syslogng-udp
  namespace: librenms
  labels:
    app: librenms-syslogng
  annotations:
    metallb.universe.tf/allow-shared-ip: "librenms-syslog"
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.98.241
  selector:
    app: librenms-syslogng
  ports:
  - name: syslog-udp
    port: 514
    targetPort: 514
    protocol: UDP
