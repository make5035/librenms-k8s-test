# ==============================================================================
# ingress/nginx-deploy.yaml
# NGINX Ingress Controller — déploiement via Helm values
# ==============================================================================
# Ce fichier documente les valeurs Helm utilisées pour déployer NGINX Ingress.
# Commande d'installation :
#
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm repo update
#   helm install ingress-nginx ingress-nginx/ingress-nginx \
#     --namespace ingress-nginx \
#     --create-namespace \
#     -f ingress/nginx-deploy.yaml
#
# Changelog v2 :
#   - ssl-passthrough activé (requis pour ArgoCD ingress)
#   - LoadBalancer type MetalLB
#   - hostNetwork: false (pods sur réseau cluster, pas sur host)
# ==============================================================================

controller:
  replicaCount: 2
  service:
    type: LoadBalancer
    # MetalLB assignera une IP depuis librenms-pool
  extraArgs:
    enable-ssl-passthrough: ""
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
  resources:
    requests:
      cpu: 100m
      memory: 90Mi
    limits:
      cpu: 500m
      memory: 256Mi
