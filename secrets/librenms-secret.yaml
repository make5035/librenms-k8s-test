# ==============================================================================
# secrets/librenms-secret.yaml
# Secret K8s — LibreNMS (frontend + syslogng + snmptrapd)
# ==============================================================================
# ⚠ CHIFFRER VIA SOPS AVANT TOUT COMMIT
#   sops --encrypt --age <AGE_PUBLIC_KEY> secrets/librenms-secret.yaml \
#        > secrets/librenms-secret.enc.yaml
#
# Changelog v2 :
#   - Ajout db-name (requis par syslogng et snmptrapd)
#   - Les valeurs entre < > sont des placeholders — remplacer avant déploiement
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: librenms-secret
  namespace: librenms
  labels:
    app: librenms
type: Opaque
stringData:
  db-username: "librenms"
  db-password: "<MOT_DE_PASSE_DB>"   # ← Chiffrer via SOPS
  db-name: "librenms"
