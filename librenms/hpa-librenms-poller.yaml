apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: librenms-poller-hpa
  namespace: librenms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: librenms-poller
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
